syntax = "proto3";

package console.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "jsonapi/v1/base.proto";
import "console/v1/auth.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v1";

// PKCE code challenge method for CLI login.
enum CLIAuthCodeChallengeMethod {
  CLI_AUTH_CODE_CHALLENGE_METHOD_UNSPECIFIED = 0;
  CLI_AUTH_CODE_CHALLENGE_METHOD_PLAIN = 1;
  CLI_AUTH_CODE_CHALLENGE_METHOD_S256 = 2;
}

// CLI token set returned after auth code exchange or refresh.
message CLIAuthToken {
  string access_token = 1;
  string refresh_token = 2;
  string token_type = 3;
  int32 expires_in = 4;
  google.protobuf.Timestamp expires_at = 5;
}

// Create a browser login session for CLI.
message CreateCLIAuthSessionRequest {
  // PKCE code challenge generated by the CLI.
  string code_challenge = 1 [(buf.validate.field).required = true];
  // PKCE challenge method.
  CLIAuthCodeChallengeMethod code_challenge_method = 2 [(buf.validate.field).required = true, (buf.validate.field).enum.defined_only = true];
  // Loopback redirect URI handled by the local CLI callback server.
  string redirect_uri = 3 [(buf.validate.field).required = true];
  // Opaque state generated by the CLI and echoed back on redirect.
  optional string state = 4;
  // Optional display name shown on the web authorization page.
  optional string client_name = 5;
}

message CreateCLIAuthSessionResponse {
  // Server-generated auth request identifier.
  string auth_request_id = 1;
  // URL that should be opened in a browser for user approval.
  string authorize_url = 2;
  // Session expiration time.
  google.protobuf.Timestamp expires_at = 3;
  // Session TTL in seconds.
  int32 expires_in = 4;
}

// Fetch CLI auth session details for the web approval page.
message GetCLIAuthSessionRequest {
  string auth_request_id = 1 [(buf.validate.field).required = true];
}

message GetCLIAuthSessionResponse {
  string auth_request_id = 1;
  string client_name = 2;
  google.protobuf.Timestamp expires_at = 3;
  bool approved = 4;
}

// Approve a CLI auth session from the logged-in web page.
message ApproveCLIAuthSessionRequest {
  string auth_request_id = 1 [(buf.validate.field).required = true];
}

message ApproveCLIAuthSessionResponse {
  // Browser should redirect to this URL to complete local CLI callback.
  string redirect_url = 1;
}

// Exchange the one-time auth code for CLI access and refresh tokens.
message ExchangeCLIAuthTokenRequest {
  string auth_request_id = 1 [(buf.validate.field).required = true];
  string auth_code = 2 [(buf.validate.field).required = true];
  string code_verifier = 3 [(buf.validate.field).required = true];
}

message ExchangeCLIAuthTokenResponse {
  ConsoleUser user = 1;
  CLIAuthToken token = 2;
}

// Refresh CLI access token.
message RefreshCLIAuthTokenRequest {
  string refresh_token = 1 [(buf.validate.field).required = true];
}

message RefreshCLIAuthTokenResponse {
  CLIAuthToken token = 1;
}

// Revoke CLI tokens during logout.
message RevokeCLIAuthTokenRequest {
  string refresh_token = 1 [(buf.validate.field).required = true];
  optional string access_token = 2;
}

message RevokeCLIAuthTokenResponse {}

// CLIAuthService provides browser-based login for the avtkit CLI.
service CLIAuthService {
  // Create a short-lived browser authorization session for CLI login.
  rpc CreateCLIAuthSession(CreateCLIAuthSessionRequest) returns (CreateCLIAuthSessionResponse) {
    option (google.api.http) = {
      post: "/v1/cli/auth/sessions"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }

  // Retrieve session details for the open-platform-web authorization page.
  rpc GetCLIAuthSession(GetCLIAuthSessionRequest) returns (GetCLIAuthSessionResponse) {
    option (google.api.http) = {
      get: "/v1/cli/auth/sessions/{auth_request_id}"
    };
    option (jsonapi.v1.requires_login) = false;
  }

  // Approve the session from the logged-in web page and produce the final loopback redirect URL.
  rpc ApproveCLIAuthSession(ApproveCLIAuthSessionRequest) returns (ApproveCLIAuthSessionResponse) {
    option (google.api.http) = {
      post: "/v1/cli/auth/sessions/{auth_request_id}:approve"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Exchange auth code plus PKCE verifier for CLI tokens.
  rpc ExchangeCLIAuthToken(ExchangeCLIAuthTokenRequest) returns (ExchangeCLIAuthTokenResponse) {
    option (google.api.http) = {
      post: "/v1/cli/auth/token"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }

  // Refresh an expired access token by refresh token.
  rpc RefreshCLIAuthToken(RefreshCLIAuthTokenRequest) returns (RefreshCLIAuthTokenResponse) {
    option (google.api.http) = {
      post: "/v1/cli/auth/token:refresh"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }

  // Revoke CLI tokens during logout.
  rpc RevokeCLIAuthToken(RevokeCLIAuthTokenRequest) returns (RevokeCLIAuthTokenResponse) {
    option (google.api.http) = {
      post: "/v1/cli/auth/token:revoke"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }
}
