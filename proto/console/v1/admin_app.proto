syntax = "proto3";

package console.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "jsonapi/v1/base.proto";
import "console/v1/console.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v1";

// List apps request (with user ID filter)
message AdminListAppsRequest {
  // Optional user ID filter
  optional string user_id = 1 [(buf.validate.field).string.uuid = true];
  // Optional app name partial match filter (for fuzzy search)
  optional string name_contains = 2;
  optional jsonapi.v1.PaginationRequest pagination = 3;
}

message AdminListAppsResponse {
  repeated App apps = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// List API keys request (with app_id and user_id filters)
message AdminListAPIKeysRequest {
  // Optional application ID filter
  optional string app_id = 1 [(buf.validate.field).string.uuid = true];
  // Optional user ID filter
  optional string user_id = 2 [(buf.validate.field).string.uuid = true];
  optional jsonapi.v1.PaginationRequest pagination = 3;
}

message AdminListAPIKeysResponse {
  repeated APIKey api_keys = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}


// Get app detail request
message AdminGetAppRequest {
  // Application ID (format: app_xxx)
  string app_id = 1 [(buf.validate.field).required = true];
}

// Get app detail response
message AdminGetAppResponse {
  // Application entity
  App app = 1;
}


// AdminAppService provides admin application and API key management
service AdminAppService {
  // List all applications with optional user ID filter
  rpc ListApps(AdminListAppsRequest) returns (AdminListAppsResponse) {
    option (google.api.http) = {
      get: "/v1/admin/apps"
    };
  }

  // List all API keys with optional app_id and user_id filters
  rpc ListAPIKeys(AdminListAPIKeysRequest) returns (AdminListAPIKeysResponse) {
    option (google.api.http) = {
      get: "/v1/admin/api-keys"
    };
  }

  // Get application detail by app_id
  rpc GetApp(AdminGetAppRequest) returns (AdminGetAppResponse) {
    option (google.api.http) = {
      get: "/v1/admin/apps/{app_id}"
    };
    option (jsonapi.v1.requires_login) = true;
  }

}

