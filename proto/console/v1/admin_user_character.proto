syntax = "proto3";

package console.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v1";

// ConsoleUserCharacter entity - user character association
message ConsoleUserCharacter {
  // ID (UUID)
  string id = 1;
  // Character ID
  string character_id = 2;
  // Console user ID (UUID)
  string console_user_id = 3;
  // Timestamp when the association was created
  google.protobuf.Timestamp created_at = 4;
  // Timestamp when the association was last updated
  google.protobuf.Timestamp updated_at = 5;
  // Whether the console user is the owner of the character. If true, the console user can edit the character.
  bool is_owner = 6;
}

// ===== Console User Characters Management =====

// List console user characters request
message AdminListUserCharactersRequest {
  // Optional console user ID filter (exact match)
  optional string console_user_id = 1 [(buf.validate.field).string.uuid = true];
  // Optional character ID filter (exact match)
  optional string character_id = 2;
  // Optional character ID partial match filter (for fuzzy search)
  optional string character_id_contains = 3;
  optional jsonapi.v1.PaginationRequest pagination = 4;
}

message AdminListUserCharactersResponse {
  repeated ConsoleUserCharacter user_characters = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// Get console user character by ID request
message AdminGetUserCharacterRequest {
  // User character ID (UUID)
  string id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
}

message AdminGetUserCharacterResponse {
  ConsoleUserCharacter user_character = 1;
}

// Create console user character request
message AdminCreateUserCharacterRequest {
  // Character ID (UUID)
  string character_id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
  // Console user ID (UUID)
  string console_user_id = 2 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
}

message AdminCreateUserCharacterResponse {
  ConsoleUserCharacter user_character = 1;
}

// Update console user character request
message AdminUpdateUserCharacterRequest {
  // User character ID (UUID)
  string id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
  // Character ID (UUID)
  optional string character_id = 2 [(buf.validate.field).string.uuid = true];
  // Console user ID (UUID)
  optional string console_user_id = 3 [(buf.validate.field).string.uuid = true];
}

message AdminUpdateUserCharacterResponse {
  ConsoleUserCharacter user_character = 1;
}

// Delete console user character request
message AdminDeleteUserCharacterRequest {
  // User character ID (UUID)
  string id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
}

message AdminDeleteUserCharacterResponse {}

// AdminUserCharacterService provides admin user character management
service AdminUserCharacterService {
  // List all console user characters with optional filters
  rpc AdminListUserCharacters(AdminListUserCharactersRequest) returns (AdminListUserCharactersResponse) {
    option (google.api.http) = {
      get: "/v1/admin/user-characters"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Get console user character by ID
  rpc AdminGetUserCharacter(AdminGetUserCharacterRequest) returns (AdminGetUserCharacterResponse) {
    option (google.api.http) = {
      get: "/v1/admin/user-characters/{id}"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Create a new console user character
  rpc AdminCreateUserCharacter(AdminCreateUserCharacterRequest) returns (AdminCreateUserCharacterResponse) {
    option (google.api.http) = {
      post: "/v1/admin/user-characters"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Update an existing console user character
  rpc AdminUpdateUserCharacter(AdminUpdateUserCharacterRequest) returns (AdminUpdateUserCharacterResponse) {
    option (google.api.http) = {
      put: "/v1/admin/user-characters/{id}"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Delete a console user character
  rpc AdminDeleteUserCharacter(AdminDeleteUserCharacterRequest) returns (AdminDeleteUserCharacterResponse) {
    option (google.api.http) = {
      delete: "/v1/admin/user-characters/{id}"
    };
    option (jsonapi.v1.requires_login) = true;
  }
}
