syntax = "proto3";

package console.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v1";

// ConsoleConfig entity - simple KV configuration
message ConsoleConfig {
  // Configuration ID (UUID)
  string id = 1;
  // Configuration key (unique)
  string key = 2;
  // Configuration value
  string value = 3;
  // Configuration description
  string description = 4;
  // Timestamp when the config was created
  google.protobuf.Timestamp created_at = 5;
  // Timestamp when the config was last updated
  google.protobuf.Timestamp updated_at = 6;
  // Timestamp when the config was soft deleted (nullable)
  optional google.protobuf.Timestamp deleted_at = 7;
  // UUID of the user who created this config (nullable)
  optional string created_by = 8;
  // UUID of the user who last updated this config (nullable)
  optional string updated_by = 9;
}

// ConsoleUserConfig entity - user-specific configuration
message ConsoleUserConfig {
  // Config ID (auto-increment)
  int64 id = 1;
  // User ID (UUID, unique)
  string user_id = 2;
  // DPT server configuration (nullable)
  optional string dpt_server = 3;
  // Maximum number of custom avatars the user can create (nullable)
  optional int32 max_custom_avatars = 4;
  // Timestamp when the config was created
  google.protobuf.Timestamp created_at = 5;
  // Timestamp when the config was last updated
  google.protobuf.Timestamp updated_at = 6;
}

// ===== Console Configs (KV) Management =====

// List console configs request
message AdminListConfigsRequest {
  // Optional config key partial match filter (for fuzzy search)
  optional string key_contains = 1;
  optional jsonapi.v1.PaginationRequest pagination = 2;
}

message AdminListConfigsResponse {
  repeated ConsoleConfig configs = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// Get console config by key request
message AdminGetConfigRequest {
  // Configuration key
  string key = 1 [(buf.validate.field).required = true];
}

message AdminGetConfigResponse {
  ConsoleConfig config = 1;
}

// Create console config request
message AdminCreateConfigRequest {
  // Configuration key
  string key = 1 [(buf.validate.field).required = true];
  // Configuration value
  string value = 2;
  // Configuration description
  string description = 3;
  // UUID of the user who created this config (nullable)
  optional string created_by = 4 [(buf.validate.field).string.uuid = true];
}

message AdminCreateConfigResponse {
  ConsoleConfig config = 1;
}

// Update console config request
message AdminUpdateConfigRequest {
  // Configuration key
  string key = 1 [(buf.validate.field).required = true];
  // Configuration value
  optional string value = 2;
  // Configuration description
  optional string description = 3;
  // UUID of the user who updated this config (nullable)
  optional string updated_by = 4 [(buf.validate.field).string.uuid = true];
}

message AdminUpdateConfigResponse {
  ConsoleConfig config = 1;
}

// Delete console config request
message AdminDeleteConfigRequest {
  // Configuration key
  string key = 1 [(buf.validate.field).required = true];
}

message AdminDeleteConfigResponse {}

// ===== Console User Configs Management =====

// List console user configs request
message AdminListUserConfigsRequest {
  // Optional user ID filter
  optional string user_id = 1 [(buf.validate.field).string.uuid = true];
  optional jsonapi.v1.PaginationRequest pagination = 2;
}

message AdminListUserConfigsResponse {
  repeated ConsoleUserConfig user_configs = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// Get console user config by user_id request
message AdminGetUserConfigRequest {
  // User ID
  string user_id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
}

message AdminGetUserConfigResponse {
  ConsoleUserConfig user_config = 1;
}

// Create console user config request
message AdminCreateUserConfigRequest {
  // User ID
  string user_id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
  // Maximum number of custom avatars the user can create (nullable)
  optional int32 max_custom_avatars = 2;
}

message AdminCreateUserConfigResponse {
  ConsoleUserConfig user_config = 1;
}

// Update console user config request
message AdminUpdateUserConfigRequest {
  // User ID
  string user_id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
  // Maximum number of custom avatars the user can create (nullable)
  optional int32 max_custom_avatars = 2;
}

message AdminUpdateUserConfigResponse {
  ConsoleUserConfig user_config = 1;
}

// AdminConfigService provides admin configuration management
service AdminConfigService {
  // ===== Console Configs (KV) =====

  // List all console configs
  rpc AdminListConfigs(AdminListConfigsRequest) returns (AdminListConfigsResponse) {
    option (google.api.http) = {
      get: "/v1/admin/configs"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Get console config by key
  rpc AdminGetConfig(AdminGetConfigRequest) returns (AdminGetConfigResponse) {
    option (google.api.http) = {
      get: "/v1/admin/configs/{key}"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Create a new console config
  rpc AdminCreateConfig(AdminCreateConfigRequest) returns (AdminCreateConfigResponse) {
    option (google.api.http) = {
      post: "/v1/admin/configs"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Update an existing console config
  rpc AdminUpdateConfig(AdminUpdateConfigRequest) returns (AdminUpdateConfigResponse) {
    option (google.api.http) = {
      put: "/v1/admin/configs/{key}"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Delete a console config
  rpc AdminDeleteConfig(AdminDeleteConfigRequest) returns (AdminDeleteConfigResponse) {
    option (google.api.http) = {
      delete: "/v1/admin/configs/{key}"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // ===== Console User Configs =====

  // List all console user configs with optional user_id filter
  rpc AdminListUserConfigs(AdminListUserConfigsRequest) returns (AdminListUserConfigsResponse) {
    option (google.api.http) = {
      get: "/v1/admin/user-configs"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Get console user config by user_id
  rpc AdminGetUserConfig(AdminGetUserConfigRequest) returns (AdminGetUserConfigResponse) {
    option (google.api.http) = {
      get: "/v1/admin/user-configs/{user_id}"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Create a new console user config
  rpc AdminCreateUserConfig(AdminCreateUserConfigRequest) returns (AdminCreateUserConfigResponse) {
    option (google.api.http) = {
      post: "/v1/admin/user-configs"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Update console user config
  rpc AdminUpdateUserConfig(AdminUpdateUserConfigRequest) returns (AdminUpdateUserConfigResponse) {
    option (google.api.http) = {
      put: "/v1/admin/user-configs/{user_id}"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }
}
