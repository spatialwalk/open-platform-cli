syntax = "proto3";

package console.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "jsonapi/v1/base.proto";
import "console/v1/console.proto";  // 导入 console.proto 以复用 App 和 APIKey 实体

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v1";

// Note: App 和 APIKey 实体定义在 console.proto 中，这里直接复用
// 当 console.proto 被淘汰后，可以将 App 和 APIKey 移回此文件

// Create App Request/Response (AppService 专用，避免与 console.proto 冲突)
message AppServiceCreateAppRequest {
  string name = 1 [(buf.validate.field).required = true];
}

message AppServiceCreateAppResponse {
  // UUID v4 string or short ID (e.g., app_xxx_xxx)
  string app_id = 1;
}

// List Apps Request/Response (AppService 专用)
message AppServiceListAppsRequest {
  optional jsonapi.v1.PaginationRequest pagination = 1;
}

message AppServiceListAppsResponse {
  repeated App apps = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// Get App Request/Response (AppService 专用)
message AppServiceGetAppRequest {
  string app_id = 1 [(buf.validate.field).required = true];
}

message AppServiceGetAppResponse {
  App app = 1;
}

// Delete App Request/Response (AppService 专用)
message AppServiceDeleteAppRequest {
  string app_id = 1 [(buf.validate.field).required = true];
}

message AppServiceDeleteAppResponse {}

// Create API Key Request/Response (AppService 专用)
message AppServiceCreateAPIKeyRequest {
  // Application ID to create API key for
  string app_id = 1 [(buf.validate.field).required = true];
}

message AppServiceCreateAPIKeyResponse {
  // Created API key with metadata
  APIKey api_key = 1;
}

// List API Keys Request/Response (AppService 专用)
message AppServiceListAPIKeysRequest {
  // Application ID
  string app_id = 1 [(buf.validate.field).required = true];
  optional jsonapi.v1.PaginationRequest pagination = 2;
}

message AppServiceListAPIKeysResponse {
  repeated APIKey api_keys = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// Delete API Key Request/Response (AppService 专用)
message AppServiceDeleteAPIKeyRequest {
  // Application ID
  string app_id = 1 [(buf.validate.field).required = true];
  // API key to delete
  string api_key = 2 [(buf.validate.field).required = true];
}

message AppServiceDeleteAPIKeyResponse {}

// AppService provides application and API key management
// Note: 使用 AppService 前缀的消息名称以避免与 console.proto 中的 ConsoleService 冲突
// 当 console.proto 被淘汰后，可以移除前缀简化消息名称
service AppService {
  // Create a new application
  rpc CreateApp(AppServiceCreateAppRequest) returns (AppServiceCreateAppResponse) {
    option (google.api.http) = {
      post: "/v1/apps"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // List all applications with pagination
  rpc ListApps(AppServiceListAppsRequest) returns (AppServiceListAppsResponse) {
    option (google.api.http) = {
      get: "/v1/apps"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Get a specific application by ID
  rpc GetApp(AppServiceGetAppRequest) returns (AppServiceGetAppResponse) {
    option (google.api.http) = {
      get: "/v1/apps/{app_id}"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Delete an application and all its associated API keys
  rpc DeleteApp(AppServiceDeleteAppRequest) returns (AppServiceDeleteAppResponse) {
    option (google.api.http) = {
      delete: "/v1/apps/{app_id}"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Create a new API key for an application
  rpc CreateAPIKey(AppServiceCreateAPIKeyRequest) returns (AppServiceCreateAPIKeyResponse) {
    option (google.api.http) = {
      post: "/v1/apps/{app_id}/api-keys"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // List all API keys for an application
  rpc ListAPIKeys(AppServiceListAPIKeysRequest) returns (AppServiceListAPIKeysResponse) {
    option (google.api.http) = {
      get: "/v1/apps/{app_id}/api-keys"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Delete a specific API key
  rpc DeleteAPIKey(AppServiceDeleteAPIKeyRequest) returns (AppServiceDeleteAPIKeyResponse) {
    option (google.api.http) = {
      delete: "/v1/apps/{app_id}/api-keys/{api_key}"
    };
    option (jsonapi.v1.requires_login) = true;
  }
}

