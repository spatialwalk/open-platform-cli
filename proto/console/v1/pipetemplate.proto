syntax = "proto3";

package console.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v1";

enum PipeTemplateStatus {
  PIPE_TEMPLATE_STATUS_UNSPECIFIED = 0;
  PIPE_TEMPLATE_STATUS_TEST = 1;
  PIPE_TEMPLATE_STATUS_RELEASE = 2;
}

message PipeTemplateMetadata {
  string launch_template = 1;
  repeated string image = 2;
  PipeTemplateStatus status = 3;
  string tracker_version = 5;
  string gsa_version = 6;
  string pipeline_version = 7;
  string version_log = 8;

  reserved 4;
  reserved "detail_version";
}

message PipeTemplate {
  string id = 1;
  string provider = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128
  ];
  PipeTemplateMetadata metadata = 3;
  google.protobuf.Timestamp created_at = 4;
  optional google.protobuf.Timestamp updated_at = 5;
  string name = 6 [(buf.validate.field).string = {max_len: 255}];
}

message ListPipeTemplatesRequest {
  optional string provider = 1;
  optional jsonapi.v1.PaginationRequest pagination = 2;
}

message ListPipeTemplatesResponse {
  repeated PipeTemplate pipe_templates = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

message ListTrackerVersionsRequest {
  optional PipeTemplateStatus status = 1 [(buf.validate.field).enum.defined_only = true];
  optional string provider = 2 [(buf.validate.field).string.max_len = 128];
}

message ListTrackerVersionsResponse {
  repeated string tracker_versions = 1;
}

message GetPipeTemplateRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetPipeTemplateResponse {
  PipeTemplate pipe_template = 1;
}

message CreatePipeTemplateRequest {
  string provider = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128
  ];
  PipeTemplateMetadata metadata = 2 [(buf.validate.field).required = true];
  string name = 3 [(buf.validate.field).string = {max_len: 255}];
}

message CreatePipeTemplateResponse {
  PipeTemplate pipe_template = 1;
}

message UpdatePipeTemplateRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  optional string provider = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128
  ];
  optional PipeTemplateMetadata metadata = 3;
  optional string name = 4 [(buf.validate.field).string = {max_len: 255}];
}

message UpdatePipeTemplateResponse {
  PipeTemplate pipe_template = 1;
}

message DeletePipeTemplateRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeletePipeTemplateResponse {}

service PipeTemplateService {
  rpc ListPipeTemplates(ListPipeTemplatesRequest) returns (ListPipeTemplatesResponse) {
    option (google.api.http) = {get: "/v1/console/pipe-templates"};
    option (jsonapi.v1.requires_login) = false;
  }

  rpc ListTrackerVersions(ListTrackerVersionsRequest) returns (ListTrackerVersionsResponse) {
    option (google.api.http) = {get: "/v1/console/pipe-templates/tracker-versions"};
    option (jsonapi.v1.requires_login) = false;
  }

  rpc GetPipeTemplate(GetPipeTemplateRequest) returns (GetPipeTemplateResponse) {
    option (google.api.http) = {get: "/v1/console/pipe-templates/{id}"};
    option (jsonapi.v1.requires_login) = false;
  }

  rpc CreatePipeTemplate(CreatePipeTemplateRequest) returns (CreatePipeTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/console/pipe-templates"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }

  rpc UpdatePipeTemplate(UpdatePipeTemplateRequest) returns (UpdatePipeTemplateResponse) {
    option (google.api.http) = {
      put: "/v1/console/pipe-templates/{id}"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }

  rpc DeletePipeTemplate(DeletePipeTemplateRequest) returns (DeletePipeTemplateResponse) {
    option (google.api.http) = {delete: "/v1/console/pipe-templates/{id}"};
    option (jsonapi.v1.requires_login) = false;
  }
}
