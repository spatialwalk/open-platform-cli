syntax = "proto3";

package console.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v1";

// 实例信息
message Instance {
  string instance_id = 1;
  string instance_name = 2;
  string instance_type = 3;
  int64 cpu = 4;
  int64 memory = 5;
  string status = 6;
  string private_ip_address = 7;
  string public_ip_address = 8;
  string creation_time = 9;
  string zone = 10;
  string image_id = 11;
  string os_name = 12;
  map<string, string> tags = 13;
}

// 启动模板信息
message LaunchTemplate {
  string launch_template_id = 1;
  string launch_template_name = 2;
  string launch_template_version = 3;
  uint64 default_version = 4;
  uint64 latest_version = 5;
  string created_time = 6;
  string created_by = 7;
  map<string, string> tags = 8;
}

// 容器镜像信息
message ContainerImage {
  string repository_name = 1;
  string namespace = 2;
  string creation_time = 3;
  string update_time = 4;
  string brief_desc = 5;
  string description = 6;
  bool is_public = 7;
}

// 获取实例列表请求
message ListInstancesRequest {
  string tag_key = 1; // 可选的标签键过滤
  jsonapi.v1.PaginationRequest pagination = 2; // 分页请求
}

// 获取实例列表响应
message ListInstancesResponse {
  repeated Instance instances = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// 获取启动模板列表请求
message ListLaunchTemplatesRequest {
  string tag_key = 1; // 可选的标签键过滤
  jsonapi.v1.PaginationRequest pagination = 2; // 分页请求
}

// 获取启动模板列表响应
message ListLaunchTemplatesResponse {
  repeated LaunchTemplate launch_templates = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// 获取容器镜像列表请求
message ListContainerImagesRequest {
  string namespace = 1; // 命名空间
  jsonapi.v1.PaginationRequest pagination = 2; // 分页请求
  string source = 3; // 镜像源: "tcr" (默认,腾讯云TCR) 或 "gongji" (共绩Harbor)
}

// 获取容器镜像列表响应
message ListContainerImagesResponse {
  repeated ContainerImage images = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// 获取容器镜像标签列表请求
message ListContainerImageTagsRequest {
  string namespace = 1; // 命名空间
  string repository_name = 2 [(buf.validate.field).string.min_len = 1]; // 仓库名称
  string source = 3; // 镜像源: "tcr" (默认,腾讯云TCR) 或 "gongji" (共绩Harbor)
  jsonapi.v1.PaginationRequest pagination = 4; // 分页请求
}

// 容器镜像标签信息
message ContainerImageTag {
  string tag = 1; // 标签名称
  string digest = 2; // 镜像摘要
  int64 size = 3; // 镜像大小（字节）
  string push_time = 4; // 推送时间
}

// 获取容器镜像标签列表响应
message ListContainerImageTagsResponse {
  repeated ContainerImageTag tags = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

service InstanceManagementService {
  // 获取实例列表
  rpc ListInstances(ListInstancesRequest) returns (ListInstancesResponse) {
    option (google.api.http) = {get: "/v1/console/instances"};
    option (jsonapi.v1.requires_login) = false;
  }

  // 获取启动模板列表
  rpc ListLaunchTemplates(ListLaunchTemplatesRequest) returns (ListLaunchTemplatesResponse) {
    option (google.api.http) = {get: "/v1/console/launch-templates"};
    option (jsonapi.v1.requires_login) = false;
  }

  // 获取容器镜像列表
  rpc ListContainerImages(ListContainerImagesRequest) returns (ListContainerImagesResponse) {
    option (google.api.http) = {get: "/v1/console/container-images"};
    option (jsonapi.v1.requires_login) = false;
  }

  // 获取容器镜像标签列表
  rpc ListContainerImageTags(ListContainerImageTagsRequest) returns (ListContainerImageTagsResponse) {
    option (google.api.http) = {get: "/v1/console/container-images/{namespace}/{repository_name}/tags"};
    option (jsonapi.v1.requires_login) = false;
  }
}
