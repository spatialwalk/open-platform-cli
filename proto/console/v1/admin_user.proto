syntax = "proto3";

package console.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "jsonapi/v1/base.proto";
import "console/v1/auth.proto";
import "console/v1/admin_auth.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v1";

// AdminUser is defined in admin_auth.proto

// ConsoleUserListItem wraps a ConsoleUser with optional billing information
// for admin user management list display.
message ConsoleUserListItem {
  // User information
  ConsoleUser user = 1;
  // Subscription plan name (empty if user has no subscription)
  optional string plan_name = 2;
  // Subscription plan ID
  optional string plan_id = 3;
  // Subscription status (e.g. "active", "canceled", "expired")
  optional string subscription_status = 4;
  // Credit balance (null if user has no credit record)
  optional int64 credit_balance = 5;
  // Whether the plan is unlimited (skip credit enforcement)
  optional bool is_unlimited = 6;
  // Admin remark/note for this user
  optional string remark = 7;
}

// List console users request
message ListUsersRequest {
  optional jsonapi.v1.PaginationRequest pagination = 1;
  // Filter by email (case-insensitive substring match)
  optional string email = 2;
  // Filter by subscription plan ID
  optional string plan_id = 3 [(buf.validate.field).string.uuid = true];
  // Filter by subscription status (e.g. "active", "canceled", "expired")
  optional string subscription_status = 4;
}

message ListUsersResponse {
  repeated ConsoleUserListItem users = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// List admin users request
message ListAdminUsersRequest {
  optional jsonapi.v1.PaginationRequest pagination = 1;
}

message ListAdminUsersResponse {
  repeated AdminUser admin_users = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// Create admin user request
message CreateAdminUserRequest {
  // Admin email
  string email = 1 [(buf.validate.field).required = true, (buf.validate.field).string.email = true];
  // Admin password (min 8 characters)
  string password = 2 [(buf.validate.field).required = true, (buf.validate.field).string.min_len = 8];
}

message CreateAdminUserResponse {
  // Created admin user
  AdminUser admin_user = 1;
}

// Delete admin user request
message DeleteAdminUserRequest {
  // Admin user ID
  string admin_user_id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
}

message DeleteAdminUserResponse {}

// Update user remark request
message UpdateUserRemarkRequest {
  // Console user ID
  string user_id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
  // Remark text (empty string to clear)
  string remark = 2;
}

message UpdateUserRemarkResponse {
  // Updated user list item
  ConsoleUserListItem user = 1;
}

// AdminUserService provides admin user management
service AdminUserService {
  // List all console users
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {
      get: "/v1/admin/users"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // List all admin users
  rpc ListAdminUsers(ListAdminUsersRequest) returns (ListAdminUsersResponse) {
    option (google.api.http) = {
      get: "/v1/admin/admin-users"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Create a new admin user
  rpc CreateAdminUser(CreateAdminUserRequest) returns (CreateAdminUserResponse) {
    option (google.api.http) = {
      post: "/v1/admin/admin-users"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Update remark for a console user
  rpc UpdateUserRemark(UpdateUserRemarkRequest) returns (UpdateUserRemarkResponse) {
    option (google.api.http) = {
      put: "/v1/admin/users/{user_id}/remark"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // Delete an admin user
  rpc DeleteAdminUser(DeleteAdminUserRequest) returns (DeleteAdminUserResponse) {
    option (google.api.http) = {
      delete: "/v1/admin/admin-users/{admin_user_id}"
    };
    option (jsonapi.v1.requires_login) = true;
  }
}
