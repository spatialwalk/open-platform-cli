syntax = "proto3";

package console.v1;

import "buf/validate/validate.proto";
import "common/v1/tags.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v1";

// Material type enumeration
enum MaterialType {
  MATERIAL_TYPE_UNSPECIFIED = 0;
  MATERIAL_TYPE_VIDEO = 1;
  MATERIAL_TYPE_IMAGE = 2;
}

// Material entity
message Material {
  // Unique identifier for the material
  string id = 1;
  // Type of material (video, image, etc.)
  MaterialType type = 2;
  // Human-readable name of the material
  string name = 3;
  // Original filename of the material
  string filename = 4;
  // Additional parameters and configuration for the material
  google.protobuf.Struct parameters = 5;
  // Optional description of the material content
  optional string description = 6;
  // Optional source information (where the material came from)
  optional string source = 7;
  // Optional resolution information (e.g., "1920x1080")
  optional string resolution = 8;
  // Duration in seconds (for video materials)
  int32 duration = 9;
  // File size in bytes
  int64 filesize = 10;
  // Tags for categorization and search
  repeated string tag = 11;
  // Public URL to access the material
  string url = 12;
  // R2 storage key for the material file
  string r2_key = 13;
  // Timestamp when the material was created
  google.protobuf.Timestamp created_at = 14;
  // Timestamp when the material was last updated
  google.protobuf.Timestamp updated_at = 15;
  // Timestamp when the material was soft deleted (null if not deleted)
  optional google.protobuf.Timestamp deleted_at = 16;
  // Additional metadata and custom fields
  google.protobuf.Struct metadata = 17;
  // Creator user ID
  optional string created_by = 18;
  // Related asset group IDs (UUIDs)
  repeated string asset_group_ids = 19;
  // Source material ID for tracing processing lineage (e.g., original material before adjustment)
  optional string source_material_id = 20;
  // Associated task ID (for materials generated by tasks)
  optional string task_id = 21;
}

// Create Material Request/Response
message CreateMaterialRequest {
  MaterialType type = 1 [(buf.validate.field).enum.defined_only = true];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
  string filename = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  google.protobuf.Struct parameters = 4;
  string description = 5 [(buf.validate.field).string.max_len = 1000];
  string source = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  string resolution = 7 [(buf.validate.field).string.max_len = 50];
  int32 duration = 8 [(buf.validate.field).int32 = {gte: 0}];
  int64 filesize = 9 [(buf.validate.field).int64 = {gte: 0}];
  repeated string tag = 10;
  string url = 11 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];
  string r2_key = 12 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];
  optional string created_by = 13;
  optional string source_material_id = 14 [(buf.validate.field).string.uuid = true];
}

message CreateMaterialResponse {
  Material material = 1;
}

// Get Material Request/Response
message GetMaterialRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetMaterialResponse {
  Material material = 1;
}

// List Materials Request/Response
message ListMaterialsRequest {
  optional MaterialType type = 1;
  optional string name = 2;
  optional string source = 3;
  repeated string tag = 4;
  optional jsonapi.v1.PaginationRequest pagination = 5;
  reserved 6;
  // Filter by creator user ID
  optional string created_by = 7;
  // Filter by creation time range
  optional jsonapi.v1.TimeRange creation_time_range = 8;
  // Filter by source material ID
  optional string source_material_id = 9;
  // Tag filter mode for repeated tag field (default = ANY).
  optional common.v1.TagFilterMode tag_filter_mode = 10;
}

message ListMaterialsResponse {
  repeated Material materials = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
  reserved 3;
}

// Update Material Request/Response
message UpdateMaterialRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  optional MaterialType type = 2;
  optional string name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
  optional string filename = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  google.protobuf.Struct parameters = 5;
  optional string description = 6 [(buf.validate.field).string.max_len = 1000];
  optional string source = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  optional string resolution = 8 [(buf.validate.field).string.max_len = 50];
  optional int32 duration = 9 [(buf.validate.field).int32 = {gte: 0}];
  optional int64 filesize = 10 [(buf.validate.field).int64 = {gte: 0}];
  repeated string tag = 11;
  optional string url = 12 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];
  optional string r2_key = 13 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];
  optional string source_material_id = 14 [(buf.validate.field).string.uuid = true];
}

message UpdateMaterialResponse {
  Material material = 1;
}

// Delete Material Request/Response
message DeleteMaterialRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteMaterialResponse {
  bool success = 1;
}

// AI Adjust Material Request/Response
message AdjustMaterialRequest {
  // Unique identifier for the material
  string id = 1 [(buf.validate.field).string.uuid = true];
  // Phone number
  optional string phone_number = 2;
}

message AdjustMaterialResponse {
  bool success = 1;
}

// Material Service
service MaterialService {
  rpc CreateMaterial(CreateMaterialRequest) returns (CreateMaterialResponse) {
    option (google.api.http) = {
      post: "/v1/console/materials"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }

  rpc GetMaterial(GetMaterialRequest) returns (GetMaterialResponse) {
    option (google.api.http) = {get: "/v1/console/materials/{id}"};
    option (jsonapi.v1.requires_login) = false;
  }

  rpc ListMaterials(ListMaterialsRequest) returns (ListMaterialsResponse) {
    option (google.api.http) = {get: "/v1/console/materials"};
    option (jsonapi.v1.requires_login) = false;
  }

  rpc UpdateMaterial(UpdateMaterialRequest) returns (UpdateMaterialResponse) {
    option (google.api.http) = {
      put: "/v1/console/materials/{id}"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }

  rpc DeleteMaterial(DeleteMaterialRequest) returns (DeleteMaterialResponse) {
    option (google.api.http) = {delete: "/v1/console/materials/{id}"};
    option (jsonapi.v1.requires_login) = false;
  }

  rpc AdjustMaterial(AdjustMaterialRequest) returns (AdjustMaterialResponse) {
    option (google.api.http) = {
      post: "/v1/console/materials/{id}/adjust"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }
}
