syntax = "proto3";

package console.v2;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v2";

// R2 上传业务类型
enum R2BusinessType {
  R2_BUSINESS_TYPE_UNSPECIFIED = 0;
  R2_BUSINESS_TYPE_AVATAR = 1;      // avatar
}

// 获取 R2 上传预签名 URL 请求
message GetR2PresignedPutURLRequest {
  // 业务类型，用于标识上传文件的用途
  R2BusinessType business_type = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  
  // 目标 object key（可选，如果不提供则由后端生成）
  optional string object_key = 2;
  
  // 文件类型（Content-Type），如 "image/jpeg", "image/png"
  string content_type = 3 [(buf.validate.field).string = {
    min_len: 1
  }];
  
  // URL 有效期（秒），默认 3600，范围 60-3600
  optional int64 duration_seconds = 4 [(buf.validate.field).int64 = {
    gte: 60
    lte: 3600
  }];
}

// 获取 R2 上传预签名 URL 响应
message GetR2PresignedPutURLResponse {
  // 预签名上传 URL
  string presigned_url = 1;
  
  // 实际使用的 object key
  string object_key = 2;
  
  // URL 过期时间（Unix 时间戳，秒）
  int64 expiration = 3;
}

// 公用服务
service CommonService {
  // 获取 R2 上传预签名 URL（用于上传文件）
  rpc GetR2PresignedPutURL(GetR2PresignedPutURLRequest) returns (GetR2PresignedPutURLResponse) {
    option (google.api.http) = {
      post: "/v2/console/r2-presigned-put-url"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }
}

