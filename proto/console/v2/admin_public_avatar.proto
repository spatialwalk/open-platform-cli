syntax = "proto3";

package console.v2;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v2";

// ===== 公共Avatar管理 =====

// 管理端公共Avatar信息（包含创建者信息）
message AdminPublicAvatar {
  // ID (UUID)
  string id = 1 [(buf.validate.field).string.uuid = true];
  
  // 角色ID (UUID)
  string character_id = 2 [(buf.validate.field).string.uuid = true];
  
  // 创建者ID (UUID)
  string created_by = 3 [(buf.validate.field).string.uuid = true];
  
  // 备注
  optional string remark = 4;
  
  // 创建时间
  google.protobuf.Timestamp created_at = 5;
  
  // 更新时间
  google.protobuf.Timestamp updated_at = 6;

  // 权重（用于排序，值越大越靠前）
  int32 weight = 7;

  // 角色名称（来自平台服务）
  string character_name = 8;

  // 角色封面图片URL（来自平台服务）
  string character_cover_url = 9;
}

// 列出公共Avatar请求
message AdminListPublicAvatarsRequest {
  // 可选的角色ID过滤（精确匹配）(UUID)
  optional string character_id = 1 [(buf.validate.field).string.uuid = true];
  
  // 可选的创建者ID过滤（精确匹配）
  optional string created_by = 2 [(buf.validate.field).string.uuid = true];
  
  optional jsonapi.v1.PaginationRequest pagination = 3;
}

message AdminListPublicAvatarsResponse {
  repeated AdminPublicAvatar public_avatars = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// 创建公共Avatar请求
message AdminCreatePublicAvatarRequest {
  // 角色ID (UUID)
  string character_id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
  
  // 备注
  optional string remark = 2;

  // 权重（用于排序，值越大越靠前，默认0）
  optional int32 weight = 3;
}

message AdminCreatePublicAvatarResponse {
  AdminPublicAvatar public_avatar = 1;
}

// 更新公共Avatar请求
message AdminUpdatePublicAvatarRequest {
  // 公共Avatar ID (UUID)
  string id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
  
  // 角色ID (UUID)
  optional string character_id = 2 [(buf.validate.field).string.uuid = true];
  
  // 备注
  optional string remark = 3;

  // 权重（用于排序，值越大越靠前）
  optional int32 weight = 4;
}

message AdminUpdatePublicAvatarResponse {
  AdminPublicAvatar public_avatar = 1;
}

// 删除公共Avatar请求
message AdminDeletePublicAvatarRequest {
  // 公共Avatar ID (UUID)
  string id = 1 [(buf.validate.field).required = true, (buf.validate.field).string.uuid = true];
}

message AdminDeletePublicAvatarResponse {}

// AdminPublicAvatarService 提供公共Avatar管理功能
service AdminPublicAvatarService {
  // 列出所有公共Avatar，支持可选过滤
  rpc AdminListPublicAvatars(AdminListPublicAvatarsRequest) returns (AdminListPublicAvatarsResponse) {
    option (google.api.http) = {
      get: "/v2/admin/public-avatars"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 创建新的公共Avatar
  rpc AdminCreatePublicAvatar(AdminCreatePublicAvatarRequest) returns (AdminCreatePublicAvatarResponse) {
    option (google.api.http) = {
      post: "/v2/admin/public-avatars"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 更新现有的公共Avatar
  rpc AdminUpdatePublicAvatar(AdminUpdatePublicAvatarRequest) returns (AdminUpdatePublicAvatarResponse) {
    option (google.api.http) = {
      put: "/v2/admin/public-avatars/{id}"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 删除公共Avatar
  rpc AdminDeletePublicAvatar(AdminDeletePublicAvatarRequest) returns (AdminDeletePublicAvatarResponse) {
    option (google.api.http) = {
      delete: "/v2/admin/public-avatars/{id}"
    };
    option (jsonapi.v1.requires_login) = true;
  }
}
