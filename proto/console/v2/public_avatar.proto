syntax = "proto3";

package console.v2;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v2";

// 公共Avatar信息
message PublicAvatar {
  // ID (UUID)
  string id = 1 [(buf.validate.field).string.uuid = true];
  
  // 角色名称
  string name = 2;
  
  // 角色描述
  string description = 3;
  
  // 封面图片URL
  string cover_url = 4;
  
  // 备注
  optional string remark = 5;
  
  // 创建时间
  google.protobuf.Timestamp created_at = 6;
  
  // 更新时间
  google.protobuf.Timestamp updated_at = 7;
}

// 列出公共Avatar请求
message ListPublicAvatarsRequest {
  optional jsonapi.v1.PaginationRequest pagination = 1;
}

// 列出公共Avatar响应
message ListPublicAvatarsResponse {
  repeated PublicAvatar public_avatars = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// 公共Avatar服务
service PublicAvatarService {
  // 列出所有公共Avatar
  rpc ListPublicAvatars(ListPublicAvatarsRequest) returns (ListPublicAvatarsResponse) {
    option (google.api.http) = {
      get: "/v2/console/public-avatars"
    };
    option (jsonapi.v1.requires_login) = true;
  }
}

