syntax = "proto3";

package console.v2;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v2";

// ============================================================================
// Enums
// ============================================================================

// 计费周期
enum BillingPeriod {
  BILLING_PERIOD_UNSPECIFIED = 0;
  BILLING_PERIOD_NONE = 1;     // Free tier
  BILLING_PERIOD_MONTHLY = 2;
  BILLING_PERIOD_YEARLY = 3;
}

// 订阅状态
enum SubscriptionStatus {
  SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
  SUBSCRIPTION_STATUS_ACTIVE = 1;
  SUBSCRIPTION_STATUS_TRIALING = 2;
  SUBSCRIPTION_STATUS_PAST_DUE = 3;
  SUBSCRIPTION_STATUS_CANCELED = 4;
  SUBSCRIPTION_STATUS_EXPIRED = 5;
  SUBSCRIPTION_STATUS_INCOMPLETE = 6;
  SUBSCRIPTION_STATUS_PAUSED = 7;
}

// Credits 交易类型
enum CreditTransactionType {
  CREDIT_TRANSACTION_TYPE_UNSPECIFIED = 0;
  CREDIT_TRANSACTION_TYPE_SUBSCRIPTION_ALLOCATION = 1;  // 订阅分配
  CREDIT_TRANSACTION_TYPE_UPGRADE_RESET = 2;            // 升级重置
  CREDIT_TRANSACTION_TYPE_MANUAL_GRANT = 3;             // 手动赠送
  CREDIT_TRANSACTION_TYPE_CONSUMPTION = 4;              // 消费
  CREDIT_TRANSACTION_TYPE_REFUND = 5;                   // 退款
  CREDIT_TRANSACTION_TYPE_ADJUSTMENT = 6;               // 调整
}

// Credits 使用类型
enum CreditUsageType {
  CREDIT_USAGE_TYPE_UNSPECIFIED = 0;
  CREDIT_USAGE_TYPE_WS_SESSION = 1;         // WebSocket 会话
  CREDIT_USAGE_TYPE_AVATAR_GENERATION = 2;  // Avatar 生成
  CREDIT_USAGE_TYPE_VOICE_CLONING = 3;      // 声音克隆
  CREDIT_USAGE_TYPE_OTHER = 4;
}

// ============================================================================
// Entities
// ============================================================================

// 订阅计划
message SubscriptionPlan {
  string id = 1;
  string name = 2;
  string description = 3;
  BillingPeriod billing_period = 4;
  int64 price_cents = 5;           // 价格（美分）
  int64 monthly_credits = 6;       // 每周期分配的 credits
  int32 max_concurrent_connections = 7;
  int32 max_session_duration_minutes = 8;
  repeated string features = 9;
  bool is_free = 10;                // 是否为免费计划
  bool is_unlimited = 11;           // 是否为不限量计划（跳过 credit 扣减）
}

// 用户订阅
message UserSubscription {
  string id = 1;
  string user_id = 2;
  string plan_id = 3;
  SubscriptionPlan plan = 4;       // 关联的计划详情
  SubscriptionStatus status = 5;
  google.protobuf.Timestamp current_period_start = 6;
  google.protobuf.Timestamp current_period_end = 7;
  optional string scheduled_plan_id = 8;    // 预定变更的计划
  optional google.protobuf.Timestamp scheduled_change_at = 9;
  optional google.protobuf.Timestamp canceled_at = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// Credits 余额
message CreditBalance {
  string user_id = 1;
  int64 balance = 2;
  int64 lifetime_earned = 3;
  int64 lifetime_consumed = 4;
  google.protobuf.Timestamp updated_at = 5;
}

// Credits 交易记录
message CreditTransaction {
  string id = 1;
  string user_id = 2;
  CreditTransactionType type = 3;
  int64 amount = 4;                // 正数=增加，负数=扣减
  int64 balance_after = 5;
  optional string reference_id = 6;
  optional string reference_type = 7;
  optional string description = 8;
  google.protobuf.Timestamp created_at = 9;
}

// Credits 使用记录
message CreditUsage {
  string id = 1;
  string user_id = 2;
  CreditUsageType usage_type = 3;
  int64 connection_duration_ms = 4;
  int32 billed_minutes = 5;
  int64 credits_consumed = 6;
  optional string session_id = 7;
  optional string app_id = 8;
  google.protobuf.Timestamp usage_date = 9;
  google.protobuf.Timestamp created_at = 10;
}

// 使用摘要
message BillingUsageSummary {
  int64 total_minutes_used = 1;
  int64 total_credits_consumed = 2;
  int32 sessions_count = 3;
  google.protobuf.Timestamp period_start = 4;
  google.protobuf.Timestamp period_end = 5;
}

// Session 权限检查结果
message SessionPermission {
  bool allowed = 1;
  int32 max_session_duration_minutes = 2;
  int32 current_connections = 3;
  int32 max_connections = 4;
  int64 current_balance = 5;
  int64 min_balance_required = 6;
  optional string denial_reason = 7;
}

// ============================================================================
// BillingService - User APIs
// ============================================================================

// 获取订阅计划列表
message ListPlansRequest {}

message ListPlansResponse {
  repeated SubscriptionPlan plans = 1;
}

// 获取当前订阅
message GetSubscriptionRequest {}

message GetSubscriptionResponse {
  UserSubscription subscription = 1;
}

// 创建订阅（跳转到 Stripe Checkout）
message CreateSubscriptionRequest {
  string plan_id = 1 [(buf.validate.field).required = true];
  string success_url = 2 [(buf.validate.field).required = true];
  string cancel_url = 3 [(buf.validate.field).required = true];
}

message CreateSubscriptionResponse {
  string checkout_url = 1;  // Stripe Checkout URL
}

// 升级订阅（跳转到 Stripe Checkout）
message UpgradeSubscriptionRequest {
  string new_plan_id = 1 [(buf.validate.field).required = true];
  string success_url = 2 [(buf.validate.field).required = true];
  string cancel_url = 3 [(buf.validate.field).required = true];
}

message UpgradeSubscriptionResponse {
  string checkout_url = 1;  // Stripe Checkout URL
}

// 降级订阅（下个周期生效）
message DowngradeSubscriptionRequest {
  string new_plan_id = 1 [(buf.validate.field).required = true];
}

message DowngradeSubscriptionResponse {
  UserSubscription subscription = 1;
  google.protobuf.Timestamp effective_at = 2;  // 生效时间
}

// 取消订阅
message CancelSubscriptionRequest {
  bool immediate = 1;  // true=立即取消，false=周期末取消
}

message CancelSubscriptionResponse {
  UserSubscription subscription = 1;
}

// 恢复订阅
message ResumeSubscriptionRequest {}

message ResumeSubscriptionResponse {
  UserSubscription subscription = 1;
}

// 获取 Stripe 客户门户
message GetCustomerPortalRequest {
  string return_url = 1 [(buf.validate.field).required = true];
}

message GetCustomerPortalResponse {
  string portal_url = 1;
}

// 获取 Credits 余额
message GetCreditBalanceRequest {}

message GetCreditBalanceResponse {
  CreditBalance balance = 1;
}

// 获取 Credits 交易记录
message ListCreditTransactionsRequest {
  optional jsonapi.v1.PaginationRequest pagination = 1;
  optional CreditTransactionType type = 2;  // 筛选类型
}

message ListCreditTransactionsResponse {
  repeated CreditTransaction transactions = 1;
  jsonapi.v1.PaginationResponse pagination = 2;
}

// 获取使用摘要
message GetUsageSummaryRequest {
  optional google.protobuf.Timestamp start_time = 1;
  optional google.protobuf.Timestamp end_time = 2;
}

message GetUsageSummaryResponse {
  BillingUsageSummary summary = 1;
}

// 检查 Session 权限
message CheckSessionPermissionRequest {}

message CheckSessionPermissionResponse {
  SessionPermission permission = 1;
}

// BillingService 用户计费服务
service BillingService {
  // 获取可用订阅计划列表
  rpc ListPlans(ListPlansRequest) returns (ListPlansResponse) {
    option (google.api.http) = {
      get: "/v2/billing/plans"
    };
  }

  // 获取当前用户的订阅信息
  rpc GetSubscription(GetSubscriptionRequest) returns (GetSubscriptionResponse) {
    option (google.api.http) = {
      get: "/v2/billing/subscription"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 创建新订阅（返回 Stripe Checkout URL）
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse) {
    option (google.api.http) = {
      post: "/v2/billing/subscription"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 升级订阅计划
  rpc UpgradeSubscription(UpgradeSubscriptionRequest) returns (UpgradeSubscriptionResponse) {
    option (google.api.http) = {
      post: "/v2/billing/subscription/upgrade"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 降级订阅计划（下个周期生效）
  rpc DowngradeSubscription(DowngradeSubscriptionRequest) returns (DowngradeSubscriptionResponse) {
    option (google.api.http) = {
      post: "/v2/billing/subscription/downgrade"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 取消订阅
  rpc CancelSubscription(CancelSubscriptionRequest) returns (CancelSubscriptionResponse) {
    option (google.api.http) = {
      post: "/v2/billing/subscription/cancel"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 恢复已取消的订阅
  rpc ResumeSubscription(ResumeSubscriptionRequest) returns (ResumeSubscriptionResponse) {
    option (google.api.http) = {
      post: "/v2/billing/subscription/resume"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 获取 Stripe 客户门户链接
  rpc GetCustomerPortal(GetCustomerPortalRequest) returns (GetCustomerPortalResponse) {
    option (google.api.http) = {
      post: "/v2/billing/customer-portal"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 获取 Credits 余额
  rpc GetCreditBalance(GetCreditBalanceRequest) returns (GetCreditBalanceResponse) {
    option (google.api.http) = {
      get: "/v2/billing/credits"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 获取 Credits 交易记录
  rpc ListCreditTransactions(ListCreditTransactionsRequest) returns (ListCreditTransactionsResponse) {
    option (google.api.http) = {
      get: "/v2/billing/credits/transactions"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 获取使用摘要
  rpc GetUsageSummary(GetUsageSummaryRequest) returns (GetUsageSummaryResponse) {
    option (google.api.http) = {
      get: "/v2/billing/usage"
    };
    option (jsonapi.v1.requires_login) = true;
  }

  // 检查是否可以开启新 Session
  rpc CheckSessionPermission(CheckSessionPermissionRequest) returns (CheckSessionPermissionResponse) {
    option (google.api.http) = {
      post: "/v2/billing/session/check"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = true;
  }
}
