syntax = "proto3";

package console.v2;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "jsonapi/v1/base.proto";

option go_package = "github.com/spatialwalk/backend-ng/api/generated/console/v2";

// Avatar Generate Task Callback Request/Response
// Realtime 回调 Console 的接口（用于avatar生成任务）
message AvatarGenerateTaskCallbackRequest {
  string apply_id = 1 [(buf.validate.field).string.uuid = true];
  
  string stage = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];  // "avatar" | "video" | "reconstruction"
  
  string status = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];  // "success" | "failed"
  
  // 处理结果数据（status 为 success 时）
  google.protobuf.Struct result = 4;
  
  // 错误信息（status 为 failed 时）
  optional string error = 5;
  
  // 时间戳（Unix 时间戳，秒）
  int64 timestamp = 6;
  
  // 防重放随机数
  string nonce = 7 [(buf.validate.field).string.min_len = 1];
  
  // HMAC-SHA256 签名
  string signature = 8 [(buf.validate.field).string.min_len = 1];
}

message AvatarGenerateTaskCallbackResponse {
  bool success = 1;
  optional string message = 2;
}

// Avatar Generate Task Callback Service
// 接收 Realtime 回调的服务（用于avatar生成任务）
service AvatarGenerateTaskCallbackService {
  // 接收 Realtime 的回调
  rpc HandleAvatarGenerateTaskCallback(AvatarGenerateTaskCallbackRequest) returns (AvatarGenerateTaskCallbackResponse) {
    option (google.api.http) = {
      post: "/v2/console/avatar-generate-task/callback"
      body: "*"
    };
    option (jsonapi.v1.requires_login) = false;
  }
}

