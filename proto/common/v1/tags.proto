syntax = "proto3";

package common.v1;

option go_package = "github.com/spatialwalk/backend-ng/api/generated/common/v1";

// TagFilterMode defines how repeated tags are matched.
enum TagFilterMode {
  TAG_FILTER_MODE_UNSPECIFIED = 0; // default = ANY
  TAG_FILTER_MODE_ANY = 1; // contains any of the tags
  TAG_FILTER_MODE_ALL = 2; // contains all of the tags
}

